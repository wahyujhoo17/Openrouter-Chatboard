<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Chatboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="description" content="Modern AI Chatboard with OpenRouter" />
    <style>
        html,
        body {
            height: 100%
        }

        body {
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial
        }
    </style>
</head>

<body class="bg-gradient-to-b from-slate-100 via-white to-slate-100 min-h-screen text-slate-800">
    <div class="max-w-7xl mx-auto p-4">
        <header class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 py-4 mb-2">
            <div class="flex items-center gap-3">
                <div
                    class="w-10 h-10 rounded-lg bg-gradient-to-br from-[#10b981] to-[#2563eb] shadow-md flex items-center justify-center text-white font-bold">
                    AI</div>
                <div>
                    <h1 class="text-2xl font-bold leading-tight">AI Chatboard</h1>
                    <p class="text-sm text-slate-500">Gaya modern seperti ChatGPT - interaksi percakapan</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button id="sidebarToggle"
                    class="md:hidden px-3 py-2 bg-white border border-slate-200 rounded-lg shadow-sm text-sm font-medium hover:bg-slate-50 transition">
                    ☰ Conversations</button>
                <button id="clearBtn"
                    class="px-4 py-2 bg-white border border-slate-200 rounded-lg shadow-sm text-sm font-medium hover:bg-slate-50 transition">Clear
                    Chat</button>
            </div>
        </header>

        <div id="sidebarOverlay" class="fixed inset-0 bg-black/40 z-40 hidden"></div>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <!-- Sidebar -->
            <aside id="sidebar"
                class="fixed inset-y-0 left-0 z-50 w-72 p-4 bg-white shadow-lg overflow-auto transform -translate-x-full transition-transform duration-300 md:relative md:translate-x-0 md:col-span-1 md:rounded-2xl md:shadow-lg md:h-[75vh] md:block md:static md:w-auto md:border-0 md:transform-none">
                <div class="flex items-center justify-between mb-4 md:hidden">
                    <h2 class="text-sm font-semibold">Conversations</h2>
                    <button id="sidebarClose" class="text-xs text-slate-500 hover:text-slate-700">Close</button>
                </div>
                <h2 class="text-sm font-semibold mb-3 hidden md:block">Conversations</h2>
                <div id="conversations" class="space-y-2">
                    <div class="text-sm text-slate-500">Tidak ada percakapan tersimpan — mulailah chat di bawah.</div>
                </div>
            </aside>

            <!-- Main chat -->
            <main class="md:col-span-3 bg-white rounded-2xl shadow-lg p-4 flex flex-col h-[70vh]">
                <div id="chatWindow"
                    class="flex-1 overflow-auto space-y-3 p-3 rounded-xl border border-slate-200 bg-slate-50"
                    style="scroll-behavior:smooth"></div>

                <div class="mt-4">
                    <form id="chatForm" class="flex gap-2">
                        <input id="inputMsg" autocomplete="off"
                            class="flex-1 rounded-full border border-slate-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent shadow-sm"
                            placeholder="Ketik pesan Anda..." />
                        <button
                            class="bg-gradient-to-r from-indigo-600 to-blue-500 hover:from-indigo-700 hover:to-blue-600 text-white font-semibold px-6 py-3 rounded-full shadow-lg transition"
                            type="submit">Send</button>
                    </form>
                    <div id="status" class="text-xs text-slate-500 mt-2"></div>
                </div>
            </main>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>

</html>
